{% extends "base.html" %}
{% block content %}
<h1 class="title">Admin Actions</h1>

<div class="table-container">
<table class="table is-striped is-fullwidth is-size-7">
  <thead>
    <tr><th>ID</th><th>Admin ID</th><th>Action</th><th>Target</th><th>Data</th><th>Time</th></tr>
  </thead>
  <tbody>
    {% for a in actions %}
    <tr>
      <td>{{ a.id }}</td>
      <td>{{ a.admin_id }}</td>
      <td>{{ a.action }}</td>
      <td>{{ a.target_user_id or "-" }}</td>
      <td class="clip">{{ a.data or "" }}</td>
      <td>{{ a.created_at }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
</div>
{% endblock %}
